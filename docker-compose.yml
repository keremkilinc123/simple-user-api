version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: postgres-db
    restart: always

    environment:
      POSTGRES_USER: kerem
      POSTGRES_PASSWORD: password
      POSTGRES_DB: backenddb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis-server
    restart: always

    ports:
      - "6379:6379"

volumes:
  postgres_data: